name: Update Zayden Gaming Dashboard

on:
  schedule:
    # Sunday 9 PM Pacific = Monday 05:00 UTC (during Pacific Standard Time)
    # Note: during Pacific Daylight Time (most of year) this fires at 10 PM PT.
    # Good enough for a weekly cadence; adjust if needed.
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run dashboard updater
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python scripts/update.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "boost-bot"
          git config user.email "boost-bot@users.noreply.github.com"
          git add index.html data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "weekly update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout latest (post-commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
